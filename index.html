<html>
<head>
  <!--

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="myportfilio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>myportfilio</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = "642533318";
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>

	<style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        #loading{
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000515;
            overflow: hidden;
        }

        .c-container{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 50px;
        }

        span {
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            animation: scale 1s ease-in alternate infinite;
        }

        @keyframes scale{
            from {
                transform: scale(.3);
            }

            to{
                transform: scale(1);
                background: linear-gradient(90deg,#f50454,#0688f3);
            }
        }
        span:nth-child(2),
        span:nth-child(3),
        span:nth-child(4) {
            transform: scale(.3);
        }

        span:nth-child(2){
            animation-delay:.2s;
        }

        span:nth-child(3){
            animation-delay: .4s;
        }

        span:nth-child(4){
            animation-delay: .6s;
        }
    </style>
</head>
<body>
   <div id="loading">
        <div class="c-container">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
  <script>
    window.addEventListener('load', function(ev) {
      var loading = document.querySelector('#loading');
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
             loading.style.display = "none";
            appRunner.runApp();
          });
        }
      });
    });
  </script>
